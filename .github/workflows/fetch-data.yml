name: Fetch TWSE Data

on:
  schedule:
    - cron: "30 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download data
        run: |
          set -euo pipefail
          mkdir -p data
          curl -L -o data/twse_stock_day_all.json "https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL"
          curl -L -o data/otc_stocks.csv "https://www.tpex.org.tw/web/stock/aftertrading/otc_quotes_no1430/stk_wn1430_result.php?l=zh-tw&se=EW&o=data"
          curl -L -o data/emerging_stocks.csv "https://www.tpex.org.tw/web/emergingstock/lateststats/new_dl.php"
          curl -L -o data/market_daily.csv "https://www.twse.com.tw/exchangeReport/FMTQIK?response=open_data"
          curl -L -o data/companies_listed.csv "https://mopsfin.twse.com.tw/opendata/t187ap03_L.csv"
          curl -L -o data/companies_otc.csv "https://mopsfin.twse.com.tw/opendata/t187ap03_O.csv"
          curl -L -o data/companies_emerging.csv "https://mopsfin.twse.com.tw/opendata/t187ap03_R.csv"
          python3 - <<'PY'
          import json
          import os
          import shutil

          def roc_to_date(roc):
            roc = str(roc).strip()
            if len(roc) == 7 and roc.isdigit():
              year = int(roc[:3]) + 1911
              return f\"{year}-{roc[3:5]}-{roc[5:7]}\"
            return \"unknown\"

          with open(\"data/twse_stock_day_all.json\", \"r\", encoding=\"utf-8\") as f:
            data = json.load(f)

          date = roc_to_date(data[0].get(\"Date\") if data else \"unknown\")
          history_dir = os.path.join(\"data\", \"history\", date)
          os.makedirs(history_dir, exist_ok=True)

          for filename in [\"twse_stock_day_all.json\", \"otc_stocks.csv\", \"emerging_stocks.csv\"]:
            shutil.copy2(os.path.join(\"data\", filename), os.path.join(history_dir, filename))

          index_path = os.path.join(\"data\", \"history\", \"index.json\")
          dates = []
          if os.path.exists(index_path):
            with open(index_path, \"r\", encoding=\"utf-8\") as f:
              try:
                dates = json.load(f)
              except Exception:
                dates = []
          if date not in dates:
            dates.append(date)
          dates = sorted(dates)[-14:]
          with open(index_path, \"w\", encoding=\"utf-8\") as f:
            json.dump(dates, f, ensure_ascii=False)
          PY

      - name: Commit updates
        run: |
          if git status --porcelain | grep -q "^ M\\|^??"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "Update data"
            git push
          else
            echo "No changes."
          fi
